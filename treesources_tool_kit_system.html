<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treesources — Tree Operation Codes &amp; Tool Set System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #505420;
    --green-light: #6b7030;
    --green-dark: #3a3d16;
    --blue: #1b3051;
    --orange: #ec8833;
    --red: #6e2c14;
    --yellow: #f3c055;
    --miami: #94adc8;
    --coral: #b88a84;
    --bg: #f6f5f0;
    --bg-card: #ffffff;
    --bg-hover: #f0efe8;
    --text: #2c2a25;
    --text-secondary: #6b6960;
    --text-muted: #9a9688;
    --border: #e2e0d8;
    --border-light: #edebe4;
    --kit-a: #c0392b;
    --kit-b: #d4760a;
    --kit-c: #1e8449;
    --kit-d: #c59100;
    --kit-e: #0e7a63;
    --kit-f: #2471a3;
    --kit-g: #6c7a7d;
    --kit-h: #2c3e50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.55; padding: 2rem 1.5rem 3rem;
    max-width: 860px; margin: 0 auto;
  }

  /* ── Header ── */
  .page-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 2rem; padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--green);
  }
  .page-header .logo-img {
    width: 56px; height: 56px; flex-shrink: 0;
    border-radius: 10px;
    object-fit: contain;
  }
  .page-header h1 {
    font-size: 1.55rem; font-weight: 700; color: var(--green-dark);
    letter-spacing: -0.3px; line-height: 1.2;
  }
  .page-header p {
    font-size: 0.88rem; color: var(--text-secondary); margin-top: 2px;
  }
  .header-right { margin-left: auto; flex-shrink: 0; }

  /* ── Language toggle ── */
  .lang-toggle {
    display: inline-flex; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
    font-size: 0.78rem; font-weight: 600;
    cursor: pointer; user-select: none;
  }
  .lang-toggle span {
    padding: 6px 14px;
    transition: background .2s, color .2s;
    color: var(--text-secondary);
    background: var(--bg-card);
  }
  .lang-toggle span.active {
    background: var(--green); color: #fff;
  }
  .lang-toggle span:not(.active):hover {
    background: var(--bg-hover);
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-muted);
    margin: 2.2rem 0 0.75rem;
  }
  .section-label:first-of-type { margin-top: 0; }

  /* ── Operations Matrix ── */
  .matrix-wrap {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg-card); position: relative;
  }
  table.matrix { border-collapse: collapse; width: 100%; min-width: 620px; font-size: 0.88rem; table-layout: fixed; }
  table.matrix thead th {
    background: var(--green); color: #fff;
    font-weight: 600; font-size: 0.74rem;
    letter-spacing: 0.4px; text-transform: uppercase;
    padding: 10px 4px; text-align: center;
    position: sticky; top: 0; z-index: 2;
    white-space: nowrap;
  }
  table.matrix thead th:first-child { text-align: left; padding-left: 12px; white-space: normal; }
  table.matrix thead th:nth-child(2) { text-align: left; white-space: normal; padding-right: 2px; }
  table.matrix thead th.kit-col { padding: 8px 2px; }
  table.matrix tbody tr { transition: background .15s; }
  table.matrix tbody tr:hover { background: var(--bg-hover); }
  table.matrix tbody td {
    padding: 10px 4px; text-align: center;
    border-top: 1px solid var(--border-light);
    vertical-align: middle;
  }
  table.matrix tbody td:first-child { text-align: left; padding-left: 12px; white-space: normal; word-wrap: break-word; }
  table.matrix tbody td:nth-child(2) { text-align: left; font-size: 0.72rem; color: var(--text-secondary); white-space: normal; word-wrap: break-word; overflow-wrap: break-word; line-height: 1.4; padding-right: 2px; }
  table.matrix tbody td:nth-child(n+3) { padding: 8px 2px; }

  /* Code pills */
  .op-code {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 0.75rem;
    letter-spacing: 0.4px; padding: 3px 8px;
    border-radius: 4px; color: #fff; margin-bottom: 1px;
  }
  .op-code.lift      { background: var(--blue); }
  .op-code.climb     { background: var(--orange); }
  .op-code.ground    { background: var(--green); }
  .op-code.protect   { background: var(--green); }
  .op-code.root      { background: var(--green-light); }
  .op-code.relocate  { background: var(--red); }
  .op-name { display: block; font-size: 0.78rem; font-weight: 500; color: var(--text); margin-top: 2px; line-height: 1.3; }

  /* Kit dots */
  .kit-dot {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 0.68rem; color: #fff;
    cursor: pointer; transition: transform .12s ease, box-shadow .12s ease;
  }
  .kit-dot:hover { transform: scale(1.12); box-shadow: 0 2px 8px rgba(0,0,0,.18); }
  .kit-dot.a { background: var(--kit-a); }
  .kit-dot.b { background: var(--kit-b); }
  .kit-dot.c { background: var(--kit-c); }
  .kit-dot.d { background: var(--kit-d); }
  .kit-dot.e { background: var(--kit-e); }
  .kit-dot.f { background: var(--kit-f); }
  .kit-dot.g { background: var(--kit-g); }
  .kit-dot.h { background: var(--kit-h); }
  .kit-dot.phased { opacity: 0.55; }
  .kit-dot.plus { position: relative; }
  .kit-dot.plus::after {
    content: '+'; position: absolute; top: -4px; right: -4px;
    font-size: 9px; font-weight: 700;
    background: var(--red); color: #fff;
    width: 13px; height: 13px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .empty-cell { color: var(--border); font-size: 0.7rem; }

  /* ── Notes ── */
  .notes-row { display: flex; flex-wrap: wrap; gap: 10px; margin: 1rem 0 0; }
  .note-card {
    flex: 1 1 280px; display: flex; gap: 10px; align-items: flex-start;
    background: var(--bg-card); border: 1px solid var(--border);
    border-left: 3px solid var(--orange); border-radius: 0 8px 8px 0;
    padding: 12px 16px; font-size: 0.84rem;
    color: var(--text-secondary); line-height: 1.5;
  }
  .note-card strong { color: var(--text); font-weight: 600; }
  .note-icon {
    flex-shrink: 0; width: 20px; height: 20px;
    background: var(--orange); color: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }

  /* ── Tool set cards ── */
  .kits-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px;
  }
  .kit-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    cursor: pointer; transition: border-color .2s, box-shadow .2s; user-select: none;
  }
  .kit-card:hover { border-color: var(--green-light); }
  .kit-card.open { border-color: var(--green); box-shadow: 0 1px 6px rgba(80,84,32,.12); }
  .kit-card .kit-head { display: flex; align-items: center; gap: 10px; }
  .kit-card .kit-head .kit-dot { cursor: inherit; flex-shrink: 0; }
  .kit-card .kit-label { font-weight: 600; font-size: 0.92rem; color: var(--text); }
  .kit-card .kit-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }
  .kit-card .chevron {
    margin-left: auto; transition: transform .2s;
    color: var(--text-muted); font-size: 0.8rem;
  }
  .kit-card.open .chevron { transform: rotate(180deg); }
  .kit-card .kit-items {
    display: none; margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border-light);
    font-size: 0.84rem; color: var(--text-secondary); line-height: 1.8;
  }
  .kit-card.open .kit-items { display: block; }
  .kit-card .kit-items .item-line { display: flex; align-items: baseline; gap: 6px; padding: 1px 0; }
  .kit-card .kit-items .item-bullet { flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; }

  /* ── Legend strip ── */
  .legend-strip {
    display: flex; flex-wrap: wrap; gap: 8px 16px;
    padding: 14px 16px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 10px; margin-top: 1.5rem;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--text-secondary); }
  .legend-swatch {
    width: 22px; height: 22px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 0.65rem; color: #fff;
  }

  /* ── Footer ── */
  .page-footer {
    margin-top: 2.5rem; padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.72rem; color: var(--text-muted);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px;
  }

  @media (max-width: 600px) {
    body { padding: 1rem 0.75rem 2rem; }
    .page-header h1 { font-size: 1.2rem; }
    .page-header { flex-wrap: wrap; gap: 10px; }
    .header-right { margin-left: 0; }
    .kits-grid { grid-template-columns: 1fr; }
    .notes-row { flex-direction: column; }
    .matrix-wrap { position: relative; }
    .matrix-wrap::after {
      content: 'Swipe →';
      position: absolute; top: 8px; right: 8px;
      font-size: 0.65rem; font-weight: 600;
      color: rgba(255,255,255,.7);
      letter-spacing: 0.5px;
      pointer-events: none;
      z-index: 3;
      animation: fadeHint 3s ease forwards;
    }
    .note-card { font-size: 0.8rem; }
    .kit-card { padding: 16px; }
    .kit-card .kit-items { font-size: 0.88rem; line-height: 2; }
    .legend-strip { gap: 8px 12px; padding: 12px; }
    .legend-item { font-size: 0.78rem; }
  }
  @keyframes fadeHint { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>

];

const allKitIds = ['a','b','c','d','e','f','g','h'];

/* ═══════════════ RENDER ═══════════════ */
function render() {
  const L = currentLang;

  /* Translate all data-en/data-es elements */
  document.querySelectorAll('[data-en]').forEach(el => {
    const val = el.getAttribute('data-' + L);
    if (val !== null) el.innerHTML = val;
  });

  /* Matrix */
  const tbody = document.getElementById('matrixBody');
  tbody.innerHTML = '';
  ops.forEach(op => {
    const tr = document.createElement('tr');
    const codeCell = document.createElement('td');
    codeCell.innerHTML = '<span class="op-code ' + op.type + '">' + op.code + '</span><span class="op-name">' + op[L + '_name'] + '</span>';
    tr.appendChild(codeCell);
    const descCell = document.createElement('td');
    descCell.textContent = op[L + '_desc'];
    tr.appendChild(descCell);
    allKitIds.forEach(kid => {
      const td = document.createElement('td');
      const hasKit = op.kits.find(k => k.replace(/[~+]/g,'') === kid);
      if (hasKit) {
        const span = document.createElement('span');
        span.className = 'kit-dot ' + kid;
        span.textContent = kid.toUpperCase();
        if (hasKit.includes('~')) span.classList.add('phased');
        if (hasKit.includes('+')) span.classList.add('plus');
        span.title = (L === 'en' ? 'Set ' : 'Kit ') + kid.toUpperCase();
        span.addEventListener('click', () => {
          const card = document.querySelector('[data-kit="' + kid + '"]');
          if (card) { card.classList.add('open'); card.scrollIntoView({ behavior:'smooth', block:'center' }); }
        });
        td.appendChild(span);
      } else {
        td.innerHTML = '<span class="empty-cell">—</span>';
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  /* Kit cards */
  const grid = document.getElementById('kitsGrid');
  grid.innerHTML = '';
  kitDefs.forEach(kit => {
    const items = kit[L + '_items'];
    const name = kit[L + '_name'];
    const card = document.createElement('div');
    card.className = 'kit-card';
    card.dataset.kit = kit.id;
    const itemCountLabel = L === 'en' ? (items.length + ' items') : (items.length + ' artículos');
    const setLabel = L === 'en' ? 'Set' : 'Kit';
    card.innerHTML =
      '<div class="kit-head">' +
        '<span class="kit-dot ' + kit.id + '">' + kit.id.toUpperCase() + '</span>' +
        '<div><div class="kit-label">' + setLabel + ' ' + kit.id.toUpperCase() + ' — ' + name + '</div>' +
        '<div class="kit-sub">' + itemCountLabel + '</div></div>' +
        '<span class="chevron">&#9660;</span>' +
      '</div>' +
      '<div class="kit-items">' +
        items.map(item =>
          '<div class="item-line"><span class="item-bullet" style="background:' + kit.color + '"></span><span>' + item + '</span></div>'
        ).join('') +
      '</div>';
    card.addEventListener('click', () => card.classList.toggle('open'));
    grid.appendChild(card);
  });

  /* Legend */
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  kitDefs.forEach(kit => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<span class="legend-swatch" style="background:' + kit.color + '">' + kit.id.toUpperCase() + '</span>' + kit[L + '_name'];
    legend.appendChild(item);
  });

  /* Footer */
  const locale = L === 'en' ? 'en-US' : 'es-ES';
  const prefix = L === 'en' ? 'Updated ' : 'Actualizado ';
  document.getElementById('footerDate').textContent = prefix + new Date().toLocaleDateString(locale, { year:'numeric', month:'long', day:'numeric' });
}

/* ═══════════════ LANGUAGE TOGGLE ═══════════════ */
document.getElementById('langToggle').addEventListener('click', function(e) {
  const target = e.target.closest('[data-lang]');
  if (!target || target.dataset.lang === currentLang) return;
  currentLang = target.dataset.lang;
  this.querySelectorAll('span').forEach(s => s.classList.toggle('active', s.dataset.lang === currentLang));
  render();
});

/* ═══════════════ INIT ═══════════════ */
render();
</script>
</body>
</html>
